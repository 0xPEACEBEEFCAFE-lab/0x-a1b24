name: Deploy PWA to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject GAS Environment Variables into index.html
        run: |
          if [ -z "${{ secrets.GAS_URL }}" ]; then
            echo "Error: GAS_URL secret is not set in GitHub Settings"
            exit 1
          fi
          # Reemplazar los marcadores
          sed -i 's|___LUMIN_GAS_DIRECT_URL___|${{ secrets.GAS_URL }}|' index.html
          echo "Variables injected successfully"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
